<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Paiement</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="payement.css">
    <link rel="icon" href="/favicon.ico" />

</head>
<body>
    <div class="security-message">
        <img src="images/cle.png" alt="Icône de sécurité" width="40">
        <p>Votre paiement est 100% sécurisé. Nous utilisons une connexion chiffrée et des normes bancaires strictes pour garantir la sécurité de vos données. Faites vos achats en toute confiance.</p>
    </div>
    
    <header>
        <h1 class="paiement-sec-header">
            <img src="images/paiement-sec.jpg" alt="Paiement sécurisé" class="paiement-sec-image">
            Paiement sécurisé
        </h1>
    </header>

    <main>
        <div class="payment-container">
            <h2>Total à payer : <span id="montant-total"></span> €</h2>
            <form id="form-paiement" action="confirmation.html" method="POST">
                <label for="nom">Nom complet :</label>
                <input type="text" id="nom" required>

                <label for="card-number">Numéro de carte :</label>
                <input type="text" id="card-number" name="card-number" maxlength="16" placeholder="XXXX XXXX XXXX XXXX" required oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 16)">

                <label for="expiration-date">Date d'expiration :</label>
                <input type="text" id="expiration-date" name="expiration-date" placeholder="MM/AAAA (ex: 05/2025)" required maxlength="7">


                <label for="cvv">CVV :</label>
                <input type="text" id="cvv" name="cvv" maxlength="3" placeholder="3 chiffres" required oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 3)">

                <button id="payer-button" type="submit">Payer</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2025 - Commandes Fruits et Légumes | Paiement sécurisé.</p>
    </footer>

    <script>
      // Remplit le total à payer depuis l'URL
      const params = new URLSearchParams(window.location.search);
      const totalPanier = params.get('total');
      document.getElementById('montant-total').textContent = totalPanier;

      document.getElementById('form-paiement').addEventListener('submit', function (e) {
        e.preventDefault(); // Empêche l'envoi du formulaire

        // Créer l'élément du message de validation
        const message = document.createElement('div');
        message.className = 'notification-validation';
        message.innerHTML = `
            <div class="notification-content">
                <h2>Paiement validé !</h2>
                <p>Votre commande a été enregistrée avec succès.</p>
                <p>Vous recevrez la facture par mail. Merci pour votre confiance !</p>
                <p>À bientôt ! 😊</p>
            </div>
        `;
        document.body.appendChild(message);

        // Retour à la page d'accueil après 4 secondes
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 6000);
    });
    </script>
</body>
</html>
